name: nas-portfolio-backend

services:
  db:
    image: mysql:8.0
    container_name: nas-portfolio-db
    restart: unless-stopped
    volumes:
      - 'mysql_data:/var/lib/mysql'
    environment:
      MYSQL_ROOT_PASSWORD: 'Nsadik115222'
      MYSQL_DATABASE: 'default'
      MYSQL_USER: 'naeem'
      MYSQL_PASSWORD: 'Nsadik115222'
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-h'
        - 127.0.0.1
        - '-u'
        - root
        - '-pNsadik115222'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nas-portfolio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'mysql+pymysql://naeem:Nsadik115222@db:3306/default'
      SQLALCHEMY_DATABASE_URI: 'mysql+pymysql://naeem:Nsadik115222@db:3306/default'
      MYSQL_USER: 'naeem'
      MYSQL_PASSWORD: 'Nsadik115222'
      MYSQL_DATABASE: 'default'
      MYSQL_HOST: 'db'
      MYSQL_SERVER: 'db'
      DB_HOST: 'db'
      DATABASE_HOST: 'db'
      DB_SERVER: 'db'
      DATABASE_SERVER: 'db'
      MYSQL_DB_HOST: 'db'
      SQL_SERVER: 'db'

      JWT_SECRET: 'somethingrandom'
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MIN: '200'
      ADMIN_BOOTSTRAP_EMAIL: 'naeemabdullahsadik@gmail.com'
      ADMIN_BOOTSTRAP_PASSWORD: '512131'

      CORS_ORIGINS: 'https://naeem.uiucomputerclub.com'
      PUBLIC_API_URL: 'https://portfolioapi.uiucomputerclub.com'
      NEXT_PUBLIC_SITE_URL: 'https://naeem.uiucomputerclub.com'
      NEXT_PUBLIC_API_URL: 'https://portfolioapi.uiucomputerclub.com'
      API_INTERNAL_URL: 'http://backend:8000'
      SERVICE_FQDN_BACKEND: 'portfolioapi.uiucomputerclub.com'
      SERVICE_URL_BACKEND: 'https://portfolioapi.uiucomputerclub.com'
      SERVICE_FQDN_FRONTEND: 'naeem.uiucomputerclub.com'
      SERVICE_URL_FRONTEND: 'https://naeem.uiucomputerclub.com'

      UPLOAD_DIR: /data/uploads
      SNAPSHOTS_DIR: /data/snapshots
      MAX_UPLOAD_MB: '8'
      MAX_CV_UPLOAD_MB: '10'

      RESEND_API_KEY: ''
      CONTACT_NOTIFY_TO: ''
    volumes:
      - 'uploads_data:/data/uploads'
      - 'snapshots_data:/data/snapshots'
    healthcheck:
      test:
        - CMD
        - python
        - '-c'
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
    name: nas-portfolio-mysql
  uploads_data:
    name: nas-portfolio-uploads
  snapshots_data:
    name: nas-portfolio-snapshots