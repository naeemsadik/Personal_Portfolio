name: nas-portfolio-backend

# Docker Compose for self-hosting the FastAPI BACKEND + MySQL on Coolify.
#
# The Next.js FRONTEND is NOT part of this compose — it's hosted
# elsewhere (e.g. Vercel). The two services communicate over HTTPS.
#
# Services:
#   - backend  (FastAPI + uvicorn, listens on container port 8080)
#   - db       (MySQL 8, internal only — not exposed to the host)
#
# Persistent data:
#   - mysql_data     : MySQL datadir (survives restarts + redeploys)
#   - uploads_data   : backend file uploads served at /media/*
#   - snapshots_data : generated static snapshots (admin-only feature)
#
# How to deploy on Coolify:
#   1. Push the repo to GitHub/GitLab.
#   2. In Coolify: "+ New Resource" → "Docker Compose" → point at this repo.
#      Coolify will detect `docker-compose.yml` automatically.
#   3. Set the following environment variables in the Coolify service
#      (these get injected into the containers at runtime — never commit
#      real secrets):
#
#        # --- Database ---
#        MYSQL_ROOT_PASSWORD      (strong random, ≥24 chars)
#        MYSQL_DATABASE           = portfolio
#        MYSQL_USER               = portfolio
#        MYSQL_PASSWORD           (strong random, ≥24 chars)
#
#        # --- Backend ---
#        JWT_SECRET               (secrets.token_urlsafe(48))
#        JWT_EXPIRE_MIN           = 60
#        ADMIN_BOOTSTRAP_EMAIL    = [email protected]
#        ADMIN_BOOTSTRAP_PASSWORD (strong random — change after first login)
#
#        # --- Frontend wiring ---
#        CORS_ORIGINS             = https://your-frontend-host
#        PUBLIC_API_URL           = https://api.your-backend-host
#        NEXT_PUBLIC_SITE_URL     = https://your-frontend-host
#
#        # --- Uploads ---
#        MAX_UPLOAD_MB            = 8
#        MAX_CV_UPLOAD_MB         = 10
#
#        # --- Optional: contact-form email notifications ---
#        RESEND_API_KEY           (optional)
#        CONTACT_NOTIFY_TO        (optional)
#
#   4. Expose the container's port 8080 in Coolify's "Port Mappings" UI.
#      IMPORTANT: pick a HOST port that does NOT collide with Coolify
#      itself — Coolify's web UI listens on port 8000 by default, so use
#          8001:8080  (or any other free host port)
#      Or set a domain in the "Domains" section so Traefik handles TLS
#      and you don't need a direct port mapping.
#
#   5. First boot: the backend container runs `python -m app.prestart`
#      (which calls `Base.metadata.create_all` to bootstrap the schema)
#      then `python -m app.seed` which creates the admin user + initial
#      content. After that, log into /admin/login (on the frontend) and
#      change the password.
#
# Notes:
#   - The `db` service has NO host port mapping (`ports:` omitted on
#     purpose) so MySQL is reachable only from `backend` over the
#     compose-internal network. If you want to inspect it from outside
#     temporarily, add `"3306:3306"` and remove it after.
#   - The `uploads_data` and `snapshots_data` volumes persist
#     user-uploaded media and generated snapshots across redeploys.
#     `docker compose down -v` would wipe them — only use for a true
#     reset.
#   - The .env.coolify.example file in the repo root lists every
#     variable above, blank, ready to copy into Coolify.

services:
  db:
    image: mysql:8.0
    container_name: nas-portfolio-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in Coolify}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-portfolio}
      MYSQL_USER: ${MYSQL_USER:-portfolio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in Coolify}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # mysqladmin ping returns 0 only when the server is accepting
      # connections — gates the backend start until DB is really ready.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # No `ports:` block — DB stays internal to the compose network.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nas-portfolio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # --- Database ---
      # Built from MYSQL_USER / MYSQL_PASSWORD / MYSQL_DATABASE so it
      # stays in sync with the `db` service above. If you override
      # DATABASE_URL, you must keep the credentials matching what the
      # MySQL service was initialized with — otherwise you get
      # 'Access denied for user ...' on every connection.
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-portfolio}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in Coolify}@db:3306/${MYSQL_DATABASE:-portfolio}

      # --- Backend auth ---
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in Coolify}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MIN: ${JWT_EXPIRE_MIN:-60}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}

      # --- Frontend wiring ---
      CORS_ORIGINS: ${CORS_ORIGINS}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}

      # --- Filesystem paths (all inside the /data volume) ---
      # Both UPLOAD_DIR and SNAPSHOTS_DIR live on the same persistent
      # volume. They MUST be set explicitly because the default
      # snapshot path (computed by `app/config.py`) assumes a
      # development layout (../frontend/public/__snapshots__) that
      # doesn't exist in the Docker image.
      UPLOAD_DIR: /data/uploads
      SNAPSHOTS_DIR: /data/snapshots

      # --- Uploads ---
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-8}
      MAX_CV_UPLOAD_MB: ${MAX_CV_UPLOAD_MB:-10}

      # --- Optional: contact-form email notifications ---
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_NOTIFY_TO: ${CONTACT_NOTIFY_TO:-}
    volumes:
      - uploads_data:/data/uploads
      - snapshots_data:/data/snapshots
    # NO `ports:` and NO `expose:` on purpose.
    #
    # Coolify handles host port publishing and reverse-proxy routing
    # via its own "Port Mappings" UI and Traefik. The container
    # listens on port 8080 (see backend/Dockerfile's EXPOSE 8080 +
    # uvicorn --port 8080). The host port (e.g. 8001) is configured
    # in Coolify's resource UI — set it there to avoid colliding with
    # Coolify's own web UI (which uses port 8000 by default).
    healthcheck:
      # Matches the container's actual uvicorn port (8080).
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
    # Survives `docker compose down` (no `-v` flag). `docker compose
    # down -v` removes it — use only for a true reset.
    name: nas-portfolio-mysql
  uploads_data:
    # Persists user-uploaded media across redeploys; mounted at
    # /data/uploads in the backend container (UPLOAD_DIR above).
    name: nas-portfolio-uploads
  snapshots_data:
    # Persists generated static snapshots across redeploys; mounted
    # at /data/snapshots in the backend container (SNAPSHOTS_DIR).
    name: nas-portfolio-snapshots

